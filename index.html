<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleek React Todo List with Autosave</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel standalone for in-browser JSX compiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e1b4b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --delete-color: #ef4444;
            --delete-hover: #dc2626;
            --date-header: #c084fc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 4rem 2rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .input-wrapper {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            min-width: 250px;
        }

        input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        
        input[type="text"] {
            flex: 1;
        }
        
        input[type="date"] {
            width: 180px;
            cursor: pointer;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
        }
        
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
            cursor: pointer;
            transition: 0.2s;
        }
        ::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        button.add-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
            white-space: nowrap;
        }

        button.add-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }
        
        button.add-btn:active {
            transform: translateY(0);
        }

        .date-group {
            margin-bottom: 1.5rem;
            animation: fadeIn 0.4s ease-out;
        }
        
        .date-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--date-header);
            margin-bottom: 0.75rem;
            padding-bottom: 0.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .todo-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .todo-text {
            font-size: 1.05rem;
            word-break: break-all;
            padding-right: 1rem;
        }

        button.delete-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--delete-color);
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 3rem 0;
            font-size: 0.95rem;
            font-style: italic;
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        
        .glow-orb {
            position: fixed;
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
        .glow-orb-2 {
            position: fixed;
            bottom: -150px;
            right: -100px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glow-orb"></div>
    <div class="glow-orb-2"></div>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // Get today's date safely in Korean Standard Time (KST)
            const getTodayDate = () => {
                return new Intl.DateTimeFormat('en-CA', {
                    timeZone: 'Asia/Seoul',
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                }).format(new Date());
            };
            // v3 key to ensure a completely clean state
            const STORAGE_KEY = 'sleek-todo-list-data-v3';

            // Initialize from localStorage or use defaults
            const loadTodos = () => {
                const savedTodos = localStorage.getItem(STORAGE_KEY);
                if (savedTodos) {
                    try {
                        return JSON.parse(savedTodos);
                    } catch (e) {
                        console.error('Failed to parse local storage data');
                    }
                }
                return [
                    { id: 1, text: "React로 투두 앱 만들기", date: getTodayDate() },
                    { id: 2, text: "멋진 디자인 및 애니메이션 추가하기", date: getTodayDate() },
                    { id: 3, text: "Netlify로 멋지게 배포해보기!", date: getTodayDate() }
                ];
            };

            const [todos, setTodos] = React.useState(loadTodos());
            const [inputValue, setInputValue] = React.useState('');
            const [inputDate, setInputDate] = React.useState(getTodayDate());

            // Save to LocalStorage whenever 'todos' array changes
            React.useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
            }, [todos]);

            const handleAddTodo = (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;
                
                const newTodo = {
                    id: Date.now(),
                    text: inputValue.trim(),
                    date: inputDate || getTodayDate()
                };
                
                setTodos([newTodo, ...todos]);
                setInputValue('');
                setInputDate(getTodayDate());
            };

            const handleDelete = (idToRemove) => {
                setTodos(todos.filter(todo => todo.id !== idToRemove));
            };

            // Grouping logic
            const groupedTodos = todos.reduce((groups, todo) => {
                const date = todo.date || getTodayDate();
                if (!groups[date]) {
                    groups[date] = [];
                }
                groups[date].push(todo);
                return groups;
            }, {});

            // Sort dates chronologically (newest dates, or future dates first)
            const sortedDates = Object.keys(groupedTodos).sort((a, b) => new Date(b) - new Date(a));

            return (
                <div className="container">
                    <h1>Tasks</h1>
                    <p className="subtitle">Your elegantly simple to-do list, saved safely</p>
                    
                    <form onSubmit={handleAddTodo} className="input-group">
                        <div className="input-wrapper">
                            <input 
                                type="date" 
                                value={inputDate}
                                onChange={(e) => setInputDate(e.target.value)}
                                required
                            />
                            <input 
                                type="text" 
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                placeholder="할 일을 입력하세요..."
                                autoComplete="off"
                            />
                        </div>
                        <button type="submit" className="add-btn">Add Tasks</button>
                    </form>

                    {sortedDates.length === 0 ? (
                        <div className="empty-state">
                            모든 할 일을 마쳤습니다! 편한 날짜를 지정해 새로운 항목을 추가해보세요.
                        </div>
                    ) : (
                        <div>
                            {sortedDates.map(date => (
                                <div key={date} className="date-group">
                                    <h2 className="date-header">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                            <line x1="16" y1="2" x2="16" y2="6"></line>
                                            <line x1="8" y1="2" x2="8" y2="6"></line>
                                            <line x1="3" y1="10" x2="21" y2="10"></line>
                                        </svg>
                                        {date === getTodayDate() ? "Today" : date}
                                    </h2>
                                    <ul className="todo-list">
                                        {groupedTodos[date].map(todo => (
                                            <li key={todo.id} className="todo-item">
                                                <span className="todo-text">{todo.text}</span>
                                                <button 
                                                    className="delete-btn" 
                                                    onClick={() => handleDelete(todo.id)}
                                                    aria-label="Delete"
                                                >
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                        <polyline points="3 6 5 6 21 6"></polyline>
                                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                                        <line x1="10" y1="11" x2="10" y2="17"></line>
                                                        <line x1="14" y1="11" x2="14" y2="17"></line>
                                                    </svg>
                                                </button>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const rootNode = document.getElementById('root');
        const root = ReactDOM.createRoot(rootNode);
        root.render(<App />);
    </script>
</body>
</html>
