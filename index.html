<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Tasks 플래너</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel standalone for in-browser JSX compiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e1b4b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --delete-color: #ef4444;
            --delete-hover: #dc2626;
            --date-header: #c084fc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 4rem 2rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 0 auto 2.5rem auto;
            max-width: 600px;
        }

        .input-wrapper {
            display: flex;
            gap: 0.5rem;
            width: 100%;
            flex-wrap: wrap;
        }

        input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        
        input[type="text"] {
            flex: 1;
        }
        
        input[type="date"] {
            width: 180px;
            cursor: pointer;
        }

        input[type="time"] {
            width: 180px;
            cursor: pointer;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
        }
        
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
            cursor: pointer;
            transition: 0.2s;
        }
        ::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        button.add-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
            white-space: nowrap;
            width: 100%;
        }

        button.add-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }
        
        button.add-btn:active {
            transform: translateY(0);
        }

        .date-group {
            animation: fadeIn 0.4s ease-out;
            background: rgba(0, 0, 0, 0.15);
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .date-header {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--date-header);
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            text-align: center;
            flex-wrap: wrap;
        }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .todo-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .todo-item-content {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            overflow: hidden;
        }

        .todo-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            white-space: nowrap;
        }

        .todo-text {
            font-size: 0.95rem;
            word-break: break-all;
            padding-right: 1rem;
        }

        button.delete-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--delete-color);
        }

        .empty-state {
            display: none;
        }

        .week-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 auto 2rem auto;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.15);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .week-title {
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-primary);
            transition: color 0.2s;
        }

        .week-title:hover {
            color: var(--accent-color);
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1rem;
            width: 100%;
            align-items: start;
        }

        @media (max-width: 1200px) {
            .week-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .week-grid {
                grid-template-columns: 1fr;
            }
        }

        .empty-day-state {
            color: rgba(148, 163, 184, 0.5);
            font-size: 0.9rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.01);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            text-align: center;
        }

        .is-today .date-header {
            color: var(--accent-color);
            font-weight: 700;
        }

        .is-today .date-header svg {
            color: var(--accent-color);
        }
        
        .glow-orb {
            position: fixed;
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
        .glow-orb-2 {
            position: fixed;
            bottom: -150px;
            right: -100px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glow-orb"></div>
    <div class="glow-orb-2"></div>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const getTodayDate = () => {
                return new Intl.DateTimeFormat('en-CA', {
                    timeZone: 'Asia/Seoul',
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                }).format(new Date());
            };
            
            const STORAGE_KEY = 'sleek-todo-list-data-v3';

            const loadTodos = () => {
                const savedTodos = localStorage.getItem(STORAGE_KEY);
                if (savedTodos) {
                    try { return JSON.parse(savedTodos); } catch (e) {}
                }
                return [
                    { id: 1, text: "React로 투두 앱 만들기", date: getTodayDate(), time: "09:00" },
                    { id: 2, text: "멋진 디자인 및 애니메이션 추가하기", date: getTodayDate(), time: "14:30" },
                    { id: 3, text: "Netlify로 멋지게 배포해보기!", date: getTodayDate(), time: "" }
                ];
            };

            const [todos, setTodos] = React.useState(loadTodos());
            const [inputValue, setInputValue] = React.useState('');
            const [inputDate, setInputDate] = React.useState(getTodayDate());
            const [inputTime, setInputTime] = React.useState('');
            
            // New state for weekly view navigation
            const [viewingDateStr, setViewingDateStr] = React.useState(getTodayDate());

            React.useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
            }, [todos]);

            const handleAddTodo = (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;
                const newTodo = {
                    id: Date.now(),
                    text: inputValue.trim(),
                    date: inputDate || getTodayDate(),
                    time: inputTime || ""
                };
                setTodos([...todos, newTodo]);
                setInputValue('');
                setInputTime('');
                // Note: Keep inputDate as is to easily add multiple tasks to the same future date
            };

            const handleDelete = (idToRemove) => {
                setTodos(todos.filter(todo => todo.id !== idToRemove));
            };

            // Calculate dates for the currently viewed week
            const getWeekDays = (baseDateStr) => {
                const [y, m, d] = baseDateStr.split('-').map(Number);
                const baseDate = new Date(y, m - 1, d);
                const dayOfWeek = baseDate.getDay(); 
                
                const startOfWeek = new Date(baseDate);
                startOfWeek.setDate(startOfWeek.getDate() - dayOfWeek);
                
                const weekDays = [];
                for (let i = 0; i < 7; i++) {
                    const current = new Date(startOfWeek);
                    current.setDate(current.getDate() + i);
                    
                    const cy = current.getFullYear();
                    const cm = String(current.getMonth() + 1).padStart(2, '0');
                    const cd = String(current.getDate()).padStart(2, '0');
                    weekDays.push(`${cy}-${cm}-${cd}`);
                }
                return weekDays;
            };

            const changeWeek = (offsetDays) => {
                 const [y, m, d] = viewingDateStr.split('-').map(Number);
                 const baseDate = new Date(y, m - 1, d);
                 baseDate.setDate(baseDate.getDate() + offsetDays);
                 const ny = baseDate.getFullYear();
                 const nm = String(baseDate.getMonth() + 1).padStart(2, '0');
                 const nd = String(baseDate.getDate()).padStart(2, '0');
                 setViewingDateStr(`${ny}-${nm}-${nd}`);
            };

            const weekDays = getWeekDays(viewingDateStr);
            const weekTitle = `${weekDays[0]} ~ ${weekDays[6]}`;

            // Grouping logic
            const groupedTodos = todos.reduce((groups, todo) => {
                const date = todo.date || getTodayDate();
                if (!groups[date]) groups[date] = [];
                groups[date].push(todo);
                return groups;
            }, {});

            Object.keys(groupedTodos).forEach(date => {
                groupedTodos[date].sort((a, b) => {
                    const timeA = a.time || "";
                    const timeB = b.time || "";
                    if (timeA === timeB) return a.id - b.id;
                    if (timeA === "") return -1;
                    if (timeB === "") return 1;
                    return timeA.localeCompare(timeB);
                });
            });

            const dayNames = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];

            return (
                <div className="container">
                    <h1>Hyung Daily Tasks</h1>
                    
                    <form onSubmit={handleAddTodo} className="input-group">
                        <div className="input-wrapper">
                            <input 
                                type="date" value={inputDate}
                                onChange={(e) => setInputDate(e.target.value)}
                                required title="날짜 선택"
                            />
                            <input 
                                type="time" value={inputTime}
                                onChange={(e) => setInputTime(e.target.value)}
                                title="시간 선택 (선택사항)"
                            />
                            <input 
                                type="text" value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                placeholder="할 일을 입력하세요..."
                                autoComplete="off"
                            />
                        </div>
                        <button type="submit" className="add-btn">Add Tasks</button>
                    </form>

                    <div className="week-navigation">
                        <button onClick={() => changeWeek(-7)} className="nav-btn">❮ 이전 주</button>
                        <h2 className="week-title" onClick={() => setViewingDateStr(getTodayDate())} title="이번 주로 돌아가기">
                            {weekTitle}
                        </h2>
                        <button onClick={() => changeWeek(7)} className="nav-btn">다음 주 ❯</button>
                    </div>

                    <div className="week-grid">
                        {weekDays.map((date, index) => {
                            const isToday = date === getTodayDate();
                            const dayName = dayNames[index];
                            const [y, m, d] = date.split('-');
                            const displayHeader = `${m}/${d} (${dayName})`;
                            const dayTasks = groupedTodos[date] || [];

                            return (
                                <div key={date} className={`date-group ${isToday ? 'is-today' : ''}`}>
                                    <h2 className="date-header">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                            <line x1="16" y1="2" x2="16" y2="6"></line>
                                            <line x1="8" y1="2" x2="8" y2="6"></line>
                                            <line x1="3" y1="10" x2="21" y2="10"></line>
                                        </svg>
                                        <span>{displayHeader}</span>
                                        {isToday && <span style={{fontSize: '0.7rem', background: 'var(--accent-color)', color: 'white', padding: '2px 6px', borderRadius: '10px'}}>Today</span>}
                                    </h2>
                                    {dayTasks.length > 0 ? (
                                        <ul className="todo-list">
                                            {dayTasks.map(todo => (
                                                <li key={todo.id} className="todo-item" style={{flexDirection: 'column', alignItems: 'stretch', padding: '0.8rem'}}>
                                                    <div className="todo-item-content" style={{flexDirection: 'column', alignItems: 'flex-start', gap: '0.4rem', marginBottom: '0.5rem'}}>
                                                        {todo.time && <span className="todo-time" style={{fontSize: '0.75rem', padding: '0.1rem 0.3rem'}}>🕒 {todo.time}</span>}
                                                        <span className="todo-text" style={{fontSize: '0.9rem', padding: 0, wordBreak: 'break-word'}}>{todo.text}</span>
                                                    </div>
                                                    <button 
                                                        className="delete-btn" 
                                                        onClick={() => handleDelete(todo.id)}
                                                        aria-label="Delete"
                                                        style={{alignSelf: 'flex-end', padding: '0.2rem'}}
                                                    >
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                            <polyline points="3 6 5 6 21 6"></polyline>
                                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                                            <line x1="10" y1="11" x2="10" y2="17"></line>
                                                            <line x1="14" y1="11" x2="14" y2="17"></line>
                                                        </svg>
                                                    </button>
                                                </li>
                                            ))}
                                        </ul>
                                    ) : (
                                        <div className="empty-day-state">일정 없음</div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        const rootNode = document.getElementById('root');
        const root = ReactDOM.createRoot(rootNode);
        root.render(<App />);
    </script>
</body>
</html>
