<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Tasks 플래너</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel standalone for in-browser JSX compiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg-gradient-start: #ffffff;
            --bg-gradient-end: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-primary: #000000;
            --text-secondary: #64748b;
            --accent-color: #3b82f6;
            --accent-hover: #1d4ed8;
            --delete-color: #ef4444;
            --delete-hover: #dc2626;
            --date-header: #334155;
            --sunday-color: #ef4444;
            --today-color: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background: var(--bg-gradient-start);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 240px;
            background: #ffffff;
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 1.5rem 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 1.5rem 2rem 1.5rem;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            padding: 0 0.75rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #475569;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .nav-item:hover {
            background: #f1f5f9;
            color: var(--accent-color);
        }

        .nav-item.active {
            background: #eff6ff;
            color: var(--accent-color);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
        }

        /* Main Content Styles */
        .main-container {
            flex-grow: 1;
            padding: 3rem;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .content-card {
            width: 100%;
            max-width: 1400px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.4s ease-out;
        }

        /* Home Dashboard View */
        .dashboard-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 60vh;
            text-align: center;
        }

        .dashboard-title {
            font-size: 3rem;
            font-weight: 900;
            color: var(--text-primary);
            letter-spacing: -1px;
        }

        .dashboard-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 1rem;
        }

        /* AI News View Styles */
        .news-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .news-header {
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        .news-item-card {
            background: #ffffff;
            border-left: 4px solid var(--accent-color);
            padding: 1.5rem;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .news-item-card:hover {
            transform: translateX(5px);
        }

        .news-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #1e293b;
        }

        .news-detail {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #475569;
            margin-bottom: 0.8rem;
        }

        .news-tag {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 8px;
            display: inline-block;
        }

        .tag-content { background: #f1f5f9; color: #64748b; }
        .tag-key { background: #dcfce7; color: #166534; }
        .tag-insight { background: #fee2e2; color: #991b1b; }

        .source-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--card-border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .source-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .source-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        /* Mobile Responsive Styles (768px) */
        @media (max-width: 768px) {
            .app-layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: sticky;
                top: 0;
                padding: 0;
                border-right: none;
                border-bottom: 1px solid var(--card-border);
                flex-direction: column;
                z-index: 1000;
            }

            .sidebar-header {
                padding: 1rem 1.25rem 0.25rem 1.25rem;
                font-size: 1rem;
                justify-content: flex-start;
            }

            .nav-menu {
                flex-direction: row;
                padding: 0 0.75rem 0.75rem 0.75rem;
                gap: 0.25rem;
                justify-content: space-between;
            }

            .nav-item {
                flex: 1;
                flex-direction: column;
                padding: 0.5rem 0;
                gap: 0.2rem;
                border-radius: 8px;
                align-items: center;
                font-size: 0.7rem;
                text-align: center;
            }

            .nav-icon {
                width: 18px;
                height: 18px;
            }

            .main-container {
                padding: 1.25rem;
                width: 100%;
                background: #ffffff;
            }

            .content-card {
                padding: 1.25rem;
                border-radius: 12px;
                box-shadow: none;
                border: 1px solid var(--card-border);
            }

            .dashboard-view {
                padding: 4rem 1.25rem;
                height: auto;
                min-height: 50vh;
            }

            .dashboard-title {
                font-size: 26px !important;
                line-height: 1.3;
            }

            /* Planner adjustments for mobile */
            .week-grid {
                grid-template-columns: 1fr;
            }

            .input-group {
                max-width: 100%;
            }

            .week-navigation {
                max-width: 100%;
                flex-direction: column;
                gap: 1rem;
            }

            .week-title {
                font-size: 0.95rem;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            text-align: center;
            color: var(--text-primary);
            font-family: 'Malgun Gothic', sans-serif;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 0 auto 2.5rem auto;
            max-width: 600px;
        }

        .input-wrapper {
            display: flex;
            gap: 0.5rem;
            width: 100%;
            flex-wrap: wrap;
        }

        input {
            background: #ffffff;
            border: 1px solid var(--card-border);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Malgun Gothic', sans-serif;
        }
        
        input[type="text"] {
            flex: 1;
        }
        
        input[type="date"] {
            width: 180px;
            cursor: pointer;
        }

        input[type="time"] {
            width: 180px;
            cursor: pointer;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
        }
        
        ::-webkit-calendar-picker-indicator {
            filter: none;
            opacity: 0.6;
            cursor: pointer;
            transition: 0.2s;
        }
        ::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        button.add-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
            white-space: nowrap;
            width: 100%;
        }

        button.add-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }
        
        button.add-btn:active {
            transform: translateY(0);
        }

        .date-group {
            animation: fadeIn 0.4s ease-out;
            background: #f8fafc;
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .date-header {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--date-header);
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            text-align: center;
            flex-wrap: wrap;
        }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .todo-item {
            background: #ffffff;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }

        .todo-item:hover {
            background: #f1f5f9;
            transform: scale(1.02);
            border-color: var(--accent-color);
        }

        .todo-item-content {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            overflow: hidden;
        }

        .todo-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: #f1f5f9;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            white-space: nowrap;
        }

        .todo-text {
            font-size: 0.95rem;
            word-break: break-all;
            padding-right: 1rem;
        }

        button.delete-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--delete-color);
        }

        .empty-state {
            display: none;
        }

        .week-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 auto 2rem auto;
            max-width: 650px;
            background: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }

        .nav-btn {
            background: #ffffff;
            color: var(--text-primary);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Malgun Gothic', sans-serif;
        }

        .nav-btn:hover {
            background: #f1f5f9;
            border-color: var(--accent-color);
        }

        .week-title {
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-primary);
            transition: color 0.2s;
        }

        .week-title:hover {
            color: var(--accent-color);
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1rem;
            width: 100%;
            align-items: start;
        }

        @media (max-width: 1200px) {
            .week-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .week-grid {
                grid-template-columns: 1fr;
            }
        }

        .empty-day-state {
            color: #94a3b8;
            font-size: 0.9rem;
            padding: 1.5rem;
            background: #ffffff;
            border: 1px dashed var(--card-border);
            border-radius: 8px;
            text-align: center;
        }

        .is-today .date-header {
            color: var(--accent-color);
            font-weight: 700;
        }

        .is-today .date-header svg {
            color: var(--accent-color);
        }
        
        .glow-orb, .glow-orb-2 {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Components ---
        
        function Sidebar({ activeTab, setActiveTab }) {
            return (
                <div className="sidebar">
                    <div className="sidebar-header" onClick={() => setActiveTab('home')} style={{ cursor: 'pointer' }}>
                        <svg className="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span>HYUNG APP</span>
                    </div>
                    <nav className="nav-menu">
                        <div 
                            className={`nav-item ${activeTab === 'tasks' ? 'active' : ''}`}
                            onClick={() => setActiveTab('tasks')}
                        >
                            <svg className="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            Tasks
                        </div>
                        <div 
                            className={`nav-item ${activeTab === 'ai-news' ? 'active' : ''}`}
                            onClick={() => setActiveTab('ai-news')}
                        >
                            <svg className="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                            AI NEWS
                        </div>
                        <div 
                            className={`nav-item ${activeTab === 'account' ? 'active' : ''}`}
                            onClick={() => setActiveTab('account')}
                        >
                            <svg className="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            Account
                        </div>
                    </nav>
                </div>
            );
        }

        function DashboardView() {
            return (
                <div className="dashboard-view">
                    <h1 className="dashboard-title">HYUNG DASH BOARD</h1>
                    <p className="dashboard-subtitle">반갑습니다! 오늘 하루도 화이팅 하세요.</p>
                </div>
            );
        }

        function AiNewsView() {
            const todayNotice = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
            
            const newsData = [
                {
                    title: "1. OpenAI, GPT-4o 은퇴 발표 및 GPT-5.4 시리즈 전면 배치",
                    content: "오늘(4월 3일)을 기점으로 챗GPT 내 GPT-4o 제품군이 공식 은퇴하고, 더욱 강력한 추론 능력을 갖춘 GPT-5.4(Instant, Thinking, Pro, Mini) 시리즈로 완전히 대체됨.",
                    key: "모델 세대교체를 통해 멀티모달 처리 속도와 복잡한 문제 해결 성능을 비약적으로 향상.",
                    insight: "기존 GPT-4 기반 워크플로우를 최신 모델로 전환해야 하며, 더 정교한 프롬프트 엔지니어링이 요구되는 시점임."
                },
                {
                    title: "2. 앤스로픽(Anthropic), 기업용 수요 폭증으로 매출 140억 달러 기록",
                    content: "앤스로픽이 기업용 시장에서의 강력한 입지를 바탕으로 연간 반복 매출(ARR) 140억 달러를 돌파했으며, 기업 가치는 6,000억 달러에 도달함.",
                    key: "'클로드 코드(Claude Code)' 등 실무 에이전트 도구의 성공과 2026년 4분기 IPO 기대감 고조.",
                    insight: "OpenAI의 강력한 대항마로서 기업 시장에서 독자적인 생태계를 조기에 확보하며 시장 양강 체제 굳히기."
                },
                {
                    title: "3. 마이크로소프트, 독자 모델 'MAI' 개발 가속화: OpenAI 의존도 탈피",
                    content: "MS가 자사 서비스의 비용 효율화와 통제권 강화를 위해 자체 개발 모델인 'MAI' 제품군(Transcribe-1, Voice-1)을 마이크로소프트 365와 코파일럿에 통합 시작.",
                    key: "무스타파 술레이만 주도하에 OpenAI 의존도를 줄이고 고유의 AI 인프라 자립도 확보.",
                    insight: "빅테크 기업들이 단순히 모델을 빌려 쓰는 단계에서 벗어나, 자체 모델 최적화를 통해 수익성을 개선하는 단계로 진입."
                },
                {
                    title: "4. '에이전틱 AI(Agentic AI)'로의 패러다임 전환 가속",
                    content: "단순한 챗봇을 넘어 복잡한 추론과 실행 능력을 갖춘 '에이전틱 AI'가 실무 협업의 중심으로 부상하며, 인간과 AI가 팀으로 일하는 구조가 보편화됨.",
                    key: "AI가 사용자의 지시를 기다리지 않고 목표 달성을 위해 능동적으로 도구를 사용하고 판단하는 능력이 핵심 경쟁력으로 작용.",
                    insight: "단순 작업 자동화를 넘어 비즈니스 프로세스 설계 자체가 AI 에이전트 중심으로 재구성될 필요성이 큼."
                },
                {
                    title: "5. AI 인프라의 확장: 웨어러블 및 일상 하드웨어로의 침투",
                    content: "Nothing 등 하드웨어 제조사들이 스마트글래스, 이어버드 등에 전용 AI 프로세서를 탑재하며 AI를 실시간 일상 생활에 통합하는 제품 출시 확대.",
                    key: "클라우드를 넘어 온디바이스(On-device)에서 즉각적으로 반응하는 AI 하드웨어 생태계 구축.",
                    insight: "AI가 화면 밖으로 나와 물리적 환경과 상호작용하는 접점이 늘어남에 따라 새로운 서비스 기회가 확대될 것임."
                }
            ];

            return (
                <div className="news-container">
                    <div className="news-header-box">
                        <h2 className="news-header">### 📅 {todayNotice} AI Daily Briefing</h2>
                    </div>

                    <div className="news-list" style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
                        {newsData.map((item, index) => (
                            <div key={index} className="news-item-card">
                                <h3 className="news-title">{item.title}</h3>
                                <div className="news-detail"><span className="news-tag tag-content">내용</span> {item.content}</div>
                                <div className="news-detail"><span className="news-tag tag-key">핵심</span> {item.key}</div>
                                <div className="news-detail"><span className="news-tag tag-insight">시사점</span> {item.insight}</div>
                            </div>
                        ))}
                    </div>

                    <div className="source-footer">
                        <strong>🔗 Original Sources</strong>
                        <div className="source-grid">
                            <a href="https://techfundingnews.com" target="_blank" className="source-link">TechFundingNews</a>
                            <a href="https://www.mlq.ai" target="_blank" className="source-link">MLQ.ai</a>
                            <a href="https://www.zacks.com" target="_blank" className="source-link">Zacks</a>
                            <a href="https://mean.ceo" target="_blank" className="source-link">Mean.ceo</a>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = React.useState('home');

            const getTodayDate = () => {
                return new Intl.DateTimeFormat('en-CA', {
                    timeZone: 'Asia/Seoul',
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                }).format(new Date());
            };
            
            const STORAGE_KEY = 'sleek-todo-list-data-v3';

            const loadTodos = () => {
                const savedTodos = localStorage.getItem(STORAGE_KEY);
                if (savedTodos) {
                    try { return JSON.parse(savedTodos); } catch (e) {}
                }
                return [];
            };

            const [todos, setTodos] = React.useState(loadTodos());
            const [inputValue, setInputValue] = React.useState('');
            const [inputDate, setInputDate] = React.useState(getTodayDate());
            const [inputTime, setInputTime] = React.useState('');
            const [viewingDateStr, setViewingDateStr] = React.useState(getTodayDate());

            React.useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
            }, [todos]);

            const handleAddTodo = (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;
                const newTodo = {
                    id: Date.now(),
                    text: inputValue.trim(),
                    date: inputDate || getTodayDate(),
                    time: inputTime || ""
                };
                setTodos([...todos, newTodo]);
                setInputValue('');
                setInputTime('');
            };

            const handleDelete = (idToRemove) => {
                setTodos(todos.filter(todo => todo.id !== idToRemove));
            };

            const getWeekDays = (baseDateStr) => {
                const [y, m, d] = baseDateStr.split('-').map(Number);
                const baseDate = new Date(y, m - 1, d);
                const dayOfWeek = baseDate.getDay(); 
                const startOfWeek = new Date(baseDate);
                startOfWeek.setDate(startOfWeek.getDate() - dayOfWeek);
                const weekDays = [];
                for (let i = 0; i < 7; i++) {
                    const current = new Date(startOfWeek);
                    current.setDate(current.getDate() + i);
                    const cy = current.getFullYear();
                    const cm = String(current.getMonth() + 1).padStart(2, '0');
                    const cd = String(current.getDate()).padStart(2, '0');
                    weekDays.push(`${cy}-${cm}-${cd}`);
                }
                return weekDays;
            };

            const changeWeek = (offsetDays) => {
                 const [y, m, d] = viewingDateStr.split('-').map(Number);
                 const baseDate = new Date(y, m - 1, d);
                 baseDate.setDate(baseDate.getDate() + offsetDays);
                 const ny = baseDate.getFullYear();
                 const nm = String(baseDate.getMonth() + 1).padStart(2, '0');
                 const nd = String(baseDate.getDate()).padStart(2, '0');
                 setViewingDateStr(`${ny}-${nm}-${nd}`);
            };

            const weekDays = getWeekDays(viewingDateStr);
            const weekTitle = `${weekDays[0]} ~ ${weekDays[6]}`;
            const groupedTodos = todos.reduce((groups, todo) => {
                const date = todo.date || getTodayDate();
                if (!groups[date]) groups[date] = [];
                groups[date].push(todo);
                return groups;
            }, {});

            Object.keys(groupedTodos).forEach(date => {
                groupedTodos[date].sort((a, b) => {
                    const timeA = a.time || "";
                    const timeB = b.time || "";
                    if (timeA === timeB) return a.id - b.id;
                    if (timeA === "") return -1;
                    if (timeB === "") return 1;
                    return timeA.localeCompare(timeB);
                });
            });

            const dayNames = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];

            const renderPlanner = () => (
                <div className="content-card">
                    <h1>Hyung Daily Tasks</h1>
                    <form onSubmit={handleAddTodo} className="input-group">
                        <div className="input-wrapper">
                            <input 
                                type="date" value={inputDate}
                                onChange={(e) => setInputDate(e.target.value)}
                                required title="날짜 선택"
                            />
                            <input 
                                type="time" value={inputTime}
                                onChange={(e) => setInputTime(e.target.value)}
                                title="시간 선택 (선택사항)"
                            />
                            <input 
                                type="text" value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                placeholder="할 일을 입력하세요..."
                                autoComplete="off"
                            />
                        </div>
                        <button type="submit" className="add-btn">Add Tasks</button>
                    </form>

                    <div className="week-navigation">
                        <button onClick={() => changeWeek(-7)} className="nav-btn">❮ 이전 주</button>
                        <h2 className="week-title" onClick={() => setViewingDateStr(getTodayDate())} title="이번 주로 돌아가기">
                            {weekTitle}
                        </h2>
                        <button onClick={() => changeWeek(7)} className="nav-btn">다음 주 ❯</button>
                    </div>

                    <div className="week-grid">
                        {weekDays.map((date, index) => {
                            const isToday = date === getTodayDate();
                            const isSunday = index === 0;
                            const dayName = dayNames[index];
                            const [y, m, d] = date.split('-');
                            const displayHeader = `${m}/${d} (${dayName})`;
                            const dayTasks = groupedTodos[date] || [];
                            const headerColor = isToday ? 'var(--today-color)' : (isSunday ? 'var(--sunday-color)' : 'var(--date-header)');

                            return (
                                <div key={date} className={`date-group ${isToday ? 'is-today' : ''}`}>
                                    <h2 className="date-header" style={{ color: headerColor }}>
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                            <line x1="16" y1="2" x2="16" y2="6"></line>
                                            <line x1="8" y1="2" x2="8" y2="6"></line>
                                            <line x1="3" y1="10" x2="21" y2="10"></line>
                                        </svg>
                                        <span>{displayHeader}</span>
                                        {isToday && <span style={{fontSize: '0.7rem', background: 'var(--today-color)', color: 'white', padding: '2px 6px', borderRadius: '10px', marginLeft: '4px'}}>Today</span>}
                                    </h2>
                                    {dayTasks.length > 0 ? (
                                        <ul className="todo-list">
                                            {dayTasks.map(todo => (
                                                <li key={todo.id} className="todo-item" style={{flexDirection: 'column', alignItems: 'stretch', padding: '0.8rem'}}>
                                                    <div className="todo-item-content" style={{flexDirection: 'column', alignItems: 'flex-start', gap: '0.4rem', marginBottom: '0.5rem'}}>
                                                        {todo.time && <span className="todo-time" style={{fontSize: '0.75rem', padding: '0.1rem 0.3rem'}}>🕒 {todo.time}</span>}
                                                        <span className="todo-text" style={{fontSize: '0.9rem', padding: 0, wordBreak: 'break-word'}}>{todo.text}</span>
                                                    </div>
                                                    <button 
                                                        className="delete-btn" 
                                                        onClick={() => handleDelete(todo.id)}
                                                        aria-label="Delete"
                                                        style={{alignSelf: 'flex-end', padding: '0.2rem'}}
                                                    >
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                            <polyline points="3 6 5 6 21 6"></polyline>
                                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                                            <line x1="10" y1="11" x2="10" y2="17"></line>
                                                            <line x1="14" y1="11" x2="14" y2="17"></line>
                                                        </svg>
                                                    </button>
                                                </li>
                                            ))}
                                        </ul>
                                    ) : (
                                        <div className="empty-day-state">일정 없음</div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            return (
                <div className="app-layout">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
                    <main className="main-container">
                        {activeTab === 'home' && <DashboardView />}
                        {activeTab === 'tasks' && renderPlanner()}
                        {activeTab === 'ai-news' && <AiNewsView />}
                        {activeTab === 'account' && <div className="content-card">계정 정보를 불러오는 중... (준비 중)</div>}
                    </main>
                </div>
            );
        }

        const rootNode = document.getElementById('root');
        const root = ReactDOM.createRoot(rootNode);
        root.render(<App />);
    </script>
</body>
</html>
